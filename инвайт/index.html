```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Ули ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cormorant Garamond',serif;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e7,#fff0f5,#ffe6f2);
display:flex;
justify-content:center;
align-items:center;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
transition:1s;
}

/* Сердечки */

.heart{
position:absolute;
font-size:20px;
animation:float 10s linear infinite;
opacity:.7;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(110vh);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* КОНВЕРТ */

.envelope{
width:320px;
height:220px;
position:relative;
cursor:pointer;
transition:.4s;
}

.envelope:hover{
transform:scale(1.05);
}

.base{
width:100%;
height:100%;
background:#ffbdd2;
border-radius:10px;
position:absolute;
}

.flap{
position:absolute;
width:0;
height:0;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:120px solid #ff8fb1;
top:0;
transform-origin:top;
transition:1s;
z-index:3;
}

.envelope-text{
position:absolute;
width:100%;
text-align:center;
top:95px;
font-size:34px;
font-weight:bold;
color:white;
z-index:2;
}

.hint{
position:absolute;
bottom:-60px;
width:100%;
text-align:center;
color:#ff4f8b;
font-size:24px;
}

/* ПИСЬМО */

#letter{
display:none;
flex-direction:column;
text-align:center;
max-width:850px;
padding:50px;
background:rgba(255,255,255,.7);
backdrop-filter:blur(12px);
border-radius:30px;
box-shadow:0 15px 50px rgba(255,105,180,.15);
}

#typing{
font-size:38px;
line-height:1.7;
color:#444;
min-height:280px;
white-space:pre-line;
}

.next{
margin-top:40px;
padding:16px 35px;
border:none;
border-radius:50px;
background:#ff5f95;
color:white;
font-size:22px;
cursor:pointer;
display:none;
}

/* БИЛЕТ */

#ticketScreen{
display:none;
}

.ticket{
width:950px;
max-width:95%;
height:520px;
display:flex;
overflow:hidden;
border-radius:30px;
box-shadow:0 25px 70px rgba(0,0,0,.25);
background:white;
}

.poster{
width:40%;
background-image:url("holop3.jpg");
background-size:cover;
background-position:center;
position:relative;
}

.poster::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.15);
}

.info{
width:60%;
padding:40px;
background:linear-gradient(135deg,#fff7fa,#ffffff);
position:relative;
}

.vip{
font-size:22px;
letter-spacing:4px;
color:#ff5f95;
font-weight:bold;
}

.movie{
font-size:64px;
color:#222;
margin-top:15px;
font-weight:700;
}

.details{
margin-top:35px;
font-size:32px;
line-height:1.8;
color:#444;
}

.names{
margin-top:30px;
font-size:28px;
}

.names span{
color:#ff4f8b;
font-weight:bold;
}

.qr{
position:absolute;
right:35px;
bottom:35px;
width:100px;
height:100px;
background:
linear-gradient(90deg,#000 50%,transparent 50%),
linear-gradient(#000 50%,transparent 50%);
background-size:20px 20px;
}

.buttons{
margin-top:35px;
position:relative;
height:90px;
}

button{
border:none;
cursor:pointer;
border-radius:50px;
padding:16px 32px;
font-size:22px;
transition:.3s;
}

#yes{
background:#ff5f95;
color:white;
box-shadow:0 10px 25px rgba(255,95,149,.3);
}

#yes:hover{
transform:scale(1.08);
}

#no{
background:white;
color:#ff5f95;
position:absolute;
margin-left:20px;
}

.success{
text-align:center;
color:white;
}

.success h1{
font-size:80px;
margin-bottom:30px;
}

.success p{
font-size:38px;
line-height:1.8;
}

</style>
</head>

<body>

<div id="hearts"></div>

<!-- Конверт -->

<div class="screen" id="envelopeScreen">

<div>

<div class="envelope" onclick="openLetter()">

<div class="base"></div>
<div class="flap" id="flap"></div>

<div class="envelope-text">
💌 Для Ули
</div>

</div>

<div class="hint">
Нажми на конверт ❤️
</div>

</div>

</div>

<!-- Письмо -->

<div class="screen" id="letter">

<div id="typing"></div>

<button class="next" id="ticketBtn" onclick="showTicket()">
Открыть билет 🎟️
</button>

</div>

<!-- Билет -->

<div class="screen" id="ticketScreen">

<div class="ticket">

<div class="poster"></div>

<div class="info">

<div class="vip">
VIP CINEMA INVITATION
</div>

<div class="movie">
Холоп 3
</div>

<div class="details">
🎬 Сеанс: Холоп 3<br>
📅 Дата: 24.06<br>
🕙 Время: 22:00<br>
🍿 Ряд: Лучший<br>
❤️ Место: Рядом со мной
</div>

<div class="names">
От: <span>Витя</span><br>
Для: <span>Уля</span>
</div>

<div class="buttons">
<button id="yes">
Согласна ❤️
</button>

<button id="no">
Не согласна 💔
</button>
</div>

<div class="qr"></div>

</div>

</div>

</div>

<script>

const text = `Привет, Уля ❤️

Есть предложение...

Давай на один вечер забудем обо всех делах и просто хорошо проведём время вместе ✨

Я приглашаю тебя в кино на фильм «Холоп 3» 🎬🍿

24 июня в 22:00

Обещаю приятную атмосферу,
вкусный попкорн,
много улыбок
и отличную компанию ❤️`;

let i = 0;

function openLetter(){

document.getElementById("flap").style.transform="rotateX(180deg)";

setTimeout(()=>{

document.getElementById("envelopeScreen").style.display="none";
document.getElementById("letter").style.display="flex";

typeWriter();

},800);
}

function typeWriter(){

if(i < text.length){

document.getElementById("typing").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,35);

}else{

document.getElementById("ticketBtn").style.display="inline-block";

}

}

function showTicket(){

document.getElementById("letter").style.display="none";
document.getElementById("ticketScreen").style.display="flex";

}

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-200);
const y=Math.random()*(window.innerHeight-100);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

document.getElementById("yes").addEventListener("click",()=>{

document.body.innerHTML=`

<div class="success">

<h1>🥰 Ура! 🥰</h1>

<p>

Тогда свидание официально подтверждено ❤️

<br><br>

🎬 Холоп 3

<br>

📅 24.06

<br>

🕙 22:00

<br><br>

Буду очень ждать нашей встречи ✨

</p>

</div>

`;

document.body.style.background=
"linear-gradient(135deg,#ff7eb3,#ff8fab,#ffc2d1)";

});

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

},500);

</script>

</body>
</html>
```
